{id:101,tipo:"desarrollo",bloque:6,nombreBloque:bloqueNames[5],dificultad:"Avanzado",pregunta:"Una empresa recibió una boleta de honorarios de $1.000.000 en marzo de 2026 y otra de $600.000 en julio de 2026 del mismo trabajador independiente. Calcule las retenciones aplicables y explique cómo se informarían en la DJ 1879 para el Año Tributario 2027.",pauta:"Desarrollo:\n\n1) Tasa de retención 2026: 15,25% (Ley N° 21.133)\n\n2) Cálculo de retenciones:\n   - Boleta marzo: $1.000.000 × 15,25% = $152.500\n   - Boleta julio: $600.000 × 15,25% = $91.500\n   - Total retenciones: $244.000\n\n3) Actualización por IPC: Para la DJ 1879 del AT 2027 (sobre rentas del año comercial 2026), ambas retenciones deberán actualizarse por la variación del IPC desde el mes de emisión hasta diciembre de 2026 (factores que publicará el SII).\n\n4) Declaración en DJ 1879:\n   - Se informa en una sola línea por trabajador\n   - Sección B: RUT del trabajador, monto retenido anual actualizado, periodos marzo y julio marcados\n   - Sección C: Total honorarios sin actualizar ($1.600.000)\n   - Cuadratura: Debe coincidir con el código 151 de los F29 de marzo y julio de 2026\n\nFuente: Ley N° 21.133, Semana 15 Slides 17-23."},
{id:102,tipo:"desarrollo",bloque:6,nombreBloque:bloqueNames[5],dificultad:"Intermedio",pregunta:"Explique qué es la cuadratura entre las Declaraciones Juradas y el Formulario N° 29. ¿Qué consecuencias tiene una inconsistencia? ¿Cómo se soluciona?",pauta:"Puntos clave:\n\n1) Cuadratura: Es la verificación que realiza el SII para asegurar que las retenciones informadas en las DJ coincidan con las efectivamente declaradas y pagadas en los Formularios N° 29 mensuales durante el año.\n   - DJ 1887 se cuadra con el código 48 del F29 (retención IUSC)\n   - DJ 1879 se cuadra con el código 151 del F29 (retención honorarios)\n\n2) Consecuencias de inconsistencias:\n   - Se generan observaciones con códigos específicos: R07 (DJ 1887 vs F29) y R08 (DJ 1879 vs F29)\n   - Pueden generar problemas en las declaraciones de renta de los trabajadores informados\n   - Posibles multas y sanciones tributarias\n\n3) Solución:\n   - Verificar los montos declarados en ambos formularios y corregir el que corresponda\n   - Verificar que no existan giros de impuestos impagos asociados a algún F29\n   - Pagar los giros pendientes para levantar la observación\n   - Verificar coherencia del IUSC por rentas accesorias pagadas entre enero y abril del año siguiente\n\nFuente: Semana 15, Slides 16 y 23."},
{id:103,tipo:"desarrollo",bloque:4,nombreBloque:bloqueNames[3],dificultad:"Avanzado",pregunta:"Calcule la gratificación legal mensual para un trabajador con remuneración imponible de $1.200.000, considerando el sueldo mínimo de 2026 ($539.000). Explique paso a paso el procedimiento y determine si aplica o no el tope legal.",pauta:"Desarrollo paso a paso:\n\n1) Cálculo de la gratificación (25% de remuneración imponible):\n   Gratificación = $1.200.000 × 25% = $300.000\n\n2) Cálculo del tope máximo legal:\n   Tope anual = 4,75 × Ingreso Mínimo Mensual\n   Tope anual = 4,75 × $539.000 = $2.560.250\n   Tope mensual = $2.560.250 ÷ 12 = $213.354\n\n3) Comparación:\n   Gratificación calculada ($300.000) > Tope mensual ($213.354)\n   SÍ aplica el tope.\n\n4) Gratificación a pagar: $213.354 (el tope legal mensual)\n\n5) Explicación: Cuando el 25% de la remuneración imponible supera el tope de 4,75 ingresos mínimos mensuales (calculado con el sueldo mínimo vigente al 31 de diciembre del año respectivo), el empleador solo está obligado a pagar hasta el tope.\n\nFuente: Art. 50 Código del Trabajo; sueldo mínimo 2026 (Ley N° 21.751)."},
{id:104,tipo:"desarrollo",bloque:3,nombreBloque:bloqueNames[2],dificultad:"Intermedio",pregunta:"Una micro empresa familiar (4 socios, todos personas naturales residentes en Chile) tiene ingresos anuales promedio de 20.000 UF. ¿Qué régimen o regímenes tributarios podría elegir? ¿Cuál le recomendaría y por qué?",pauta:"Análisis:\n\n1) Regímenes a los que puede optar:\n   - Pro Pyme General (Art. 14D N°3): Sí, porque sus ingresos (20.000 UF) son inferiores a 75.000 UF.\n   - Pro Pyme Transparente (Art. 14D N°8): Sí, porque todos sus propietarios son personas naturales con domicilio en Chile y cumple el límite de ingresos.\n   - Régimen General (Art. 14A): Sí, cualquier empresa puede optar, pero no es conveniente para una Pyme.\n   - Renta Presunta: Solo si su actividad es agrícola, transporte o minería y cumple los requisitos.\n\n2) Recomendación: Pro Pyme Transparente, porque:\n   - La empresa queda completamente liberada del IDPC (0%)\n   - Los dueños tributan directamente con su Global Complementario\n   - Es el régimen más simple administrativamente\n   - Al ser 100% personas naturales chilenas, cumplen todos los requisitos\n   - Si sus rentas individuales son bajas, podrían quedar en tramos exentos o de baja tasa\n\n3) Alternativa: Si los socios tienen rentas altas por otras fuentes, podría convenir el Pro Pyme General (IDPC 12,5%) para diferir la tributación personal.\n\nFuente: Ley N° 21.210."},
{id:105,tipo:"desarrollo",bloque:6,nombreBloque:bloqueNames[5],dificultad:"Intermedio",pregunta:"Explique por qué la tasa de retención de boletas de honorarios ha ido aumentando gradualmente desde 2020 (10,75%) hasta 2026 (15,25%) y cuál es la meta final de este proceso. ¿Qué relación tiene con las cotizaciones previsionales de los trabajadores independientes?",pauta:"Puntos clave:\n\n1) Contexto: La Ley N° 21.133 (2019) estableció la obligatoriedad gradual de cotizar para los trabajadores independientes que emiten boletas de honorarios.\n\n2) Mecanismo: El alza gradual de la tasa de retención financia las cotizaciones previsionales de los independientes (AFP, salud, seguro de cesantía, SIS, accidentes). La retención se destina primero a cubrir esas cotizaciones y el remanente (si existe) se imputa como pago provisional de impuesto.\n\n3) Cronograma:\n   - 2020: 10,75%\n   - 2025: 14,5%\n   - 2026: 15,25%\n   - 2027: 16%\n   - 2028: 17% (meta final)\n\n4) Objetivo: Equiparar progresivamente la protección social de los trabajadores independientes con la de los dependientes, asegurando que también coticen para pensión, salud y cesantía.\n\n5) Impacto: El trabajador independiente recibe un monto líquido menor por cada boleta, pero a cambio acumula fondos en su AFP, tiene cobertura de salud y seguro de cesantía.\n\nFuente: Ley N° 21.133; actualización 2026."}
];

// ===== QUIZ ENGINE =====
const state={answers:{},correct:0,wrong:0};
const totalScored=preguntas.filter(p=>p.tipo!=="desarrollo").length;

function renderNav(){
const nav=document.getElementById("navBlocks");
nav.innerHTML="";
for(let b=1;b<=6;b++){
const qs=preguntas.filter(p=>p.bloque===b&&p.tipo!=="desarrollo");
const ans=qs.filter(p=>state.answers[p.id]!==undefined).length;
const btn=document.createElement("button");
btn.className="nav-btn";
btn.innerHTML=`B${b}: ${bloqueNames[b-1]} <span class="prog">${ans}/${qs.length}</span>`;
btn.onclick=()=>{const el=document.getElementById("bloque-"+b);if(el)el.scrollIntoView({behavior:"smooth",block:"start"})};
nav.appendChild(btn);
}
}

function updatePanel(){
const pct=totalScored>0?Math.round((state.correct+state.wrong)/totalScored*100):0;
document.getElementById("fpOk").textContent=state.correct;
document.getElementById("fpFail").textContent=state.wrong;
document.getElementById("fpPct").textContent=pct+"%";
document.getElementById("mainProgress").style.width=pct+"%";
if(state.correct+state.wrong>0){
const pctOk=state.correct/(state.correct+state.wrong);
const nota=Math.max(1,Math.min(7,1+pctOk*6)).toFixed(1);
document.getElementById("fpNota").textContent=nota;
}
renderNav();
if(state.correct+state.wrong===totalScored)showSummary();
}

function handleAnswer(qId,selected,isCorrect){
if(state.answers[qId]!==undefined)return;
state.answers[qId]=selected;
if(isCorrect)state.correct++;else state.wrong++;
updatePanel();
}

function renderAlternativa(q){
const card=document.createElement("div");
card.className="card";
card.id="q-"+q.id;
const letters=["A","B","C","D"];
card.innerHTML=`
<div class="card-header">
<span class="q-number">Pregunta ${q.id}</span>
<div class="q-badges">
<span class="bloque-badge ${bloqueClasses[q.bloque-1]}">${q.nombreBloque}</span>
<span class="diff-badge">${q.dificultad}</span>
</div>
</div>
<div class="q-text">${q.pregunta}</div>
<div class="options" id="opts-${q.id}">
${q.alternativas.map((a,i)=>`<button class="opt-btn" data-idx="${i}" onclick="selectAlt(${q.id},${i},${q.correcta})"><span class="letter">${letters[i]}.</span><span>${a}</span></button>`).join("")}
</div>
<div class="feedback" id="fb-${q.id}"></div>`;
return card;
}

function selectAlt(qId,idx,correctIdx){
if(state.answers[qId]!==undefined)return;
const q=preguntas.find(p=>p.id===qId);
const opts=document.querySelectorAll(`#opts-${qId} .opt-btn`);
const isCorrect=idx===correctIdx;
handleAnswer(qId,idx,isCorrect);
opts.forEach((btn,i)=>{
btn.classList.add("disabled");
if(i===correctIdx)btn.classList.add("correct");
if(i===idx&&!isCorrect)btn.classList.add("wrong");
});
const fb=document.getElementById("fb-"+qId);
fb.className=`feedback show ${isCorrect?"correct-fb":"wrong-fb"}`;
let html=`<div class="fb-title ${isCorrect?"ok":"fail"}">${isCorrect?"✓ ¡Correcto!":"✗ Incorrecto"}</div>`;
if(!isCorrect)html+=`<div style="margin-bottom:.3rem;color:var(--green);font-size:.82rem">Respuesta correcta: <strong>${["A","B","C","D"][correctIdx]}</strong></div>`;
html+=`<div>${q.retroalimentacion}</div>`;
if(q.fuente)html+=`<span class="fb-source">${q.fuente}</span>`;
fb.innerHTML=html;
}

function renderVF(q){
const card=document.createElement("div");
card.className="card";
card.id="q-"+q.id;
card.innerHTML=`
<div class="card-header">
<span class="q-number">Pregunta ${q.id}</span>
<div class="q-badges">
<span class="bloque-badge ${bloqueClasses[q.bloque-1]}">${q.nombreBloque}</span>
<span class="diff-badge">${q.dificultad}</span>
</div>
</div>
<div class="q-text">${q.pregunta}</div>
<div class="vf-options" id="opts-${q.id}">
<button class="vf-btn" onclick="selectVF(${q.id},true,${q.esVerdadero})">VERDADERO</button>
<button class="vf-btn" onclick="selectVF(${q.id},false,${q.esVerdadero})">FALSO</button>
</div>
<div class="feedback" id="fb-${q.id}"></div>`;
return card;
}

function selectVF(qId,selected,correct){
if(state.answers[qId]!==undefined)return;
const q=preguntas.find(p=>p.id===qId);
const isCorrect=selected===correct;
handleAnswer(qId,selected,isCorrect);
const btns=document.querySelectorAll(`#opts-${qId} .vf-btn`);
btns.forEach(btn=>{
btn.classList.add("disabled");
const isV=btn.textContent==="VERDADERO";
if(isV===correct)btn.classList.add("correct");
if(isV===selected&&!isCorrect)btn.classList.add("wrong");
if(!isV===!correct)btn.classList.add("correct");
if(!isV===!selected&&!isCorrect)btn.classList.add("wrong");
});
// Fix: only the correct answer gets "correct" class
btns.forEach(btn=>{
btn.classList.remove("correct","wrong");
btn.classList.add("disabled");
const isV=btn.textContent==="VERDADERO";
if((isV&&correct)||(!isV&&!correct))btn.classList.add("correct");
if((isV&&selected&&!isCorrect)||(!isV&&!selected&&!isCorrect))btn.classList.add("wrong");
});
const fb=document.getElementById("fb-"+qId);
fb.className=`feedback show ${isCorrect?"correct-fb":"wrong-fb"}`;
let html=`<div class="fb-title ${isCorrect?"ok":"fail"}">${isCorrect?"✓ ¡Correcto!":"✗ Incorrecto"}</div>`;
if(!isCorrect)html+=`<div style="margin-bottom:.3rem;color:var(--green);font-size:.82rem">Respuesta correcta: <strong>${correct?"VERDADERO":"FALSO"}</strong></div>`;
html+=`<div>${q.retroalimentacion}</div>`;
if(q.fuente)html+=`<span class="fb-source">${q.fuente}</span>`;
fb.innerHTML=html;
}

function renderDev(q){
const card=document.createElement("div");
card.className="card dev-card";
card.id="q-"+q.id;
card.innerHTML=`
<div class="card-header">
<span class="q-number">Pregunta ${q.id} — Desarrollo</span>
<div class="q-badges">
<span class="bloque-badge ${bloqueClasses[q.bloque-1]}">${q.nombreBloque}</span>
<span class="diff-badge">${q.dificultad}</span>
</div>
</div>
<div class="q-text">${q.pregunta}</div>
<textarea class="dev-textarea" placeholder="Escribe tu respuesta aquí..."></textarea>
<button class="pauta-btn" onclick="togglePauta(${q.id})">Ver pauta de respuesta</button>
<div class="pauta" id="pauta-${q.id}"><strong>Pauta de respuesta esperada:</strong><br><br>${q.pauta.replace(/\n/g,"<br>")}</div>`;
return card;
}

function togglePauta(qId){
const p=document.getElementById("pauta-"+qId);
p.classList.toggle("show");
}

function showSummary(){
const pctOk=state.correct/totalScored;
const nota=Math.max(1,Math.min(7,1+pctOk*6)).toFixed(1);
const aprobado=parseFloat(nota)>=4.0;
let msg="";
if(parseFloat(nota)>=6.5)msg="¡Excelente trabajo! Dominas los contenidos del módulo EA3 con solidez.";
else if(parseFloat(nota)>=5.5)msg="¡Muy bien! Tienes un buen manejo de la materia. Revisa los temas donde tuviste errores.";
else if(parseFloat(nota)>=4.0)msg="Aprobado. Hay áreas que puedes reforzar. Revisa las preguntas fallidas para mejorar.";
else msg="Necesitas repasar los contenidos. Revisa las retroalimentaciones de cada pregunta y vuelve a intentar.";
let bloqueHtml="";
for(let b=1;b<=6;b++){
const qs=preguntas.filter(p=>p.bloque===b&&p.tipo!=="desarrollo");
const ok=qs.filter(p=>{
if(p.tipo==="alternativa")return state.answers[p.id]===p.correcta;
if(p.tipo==="vf")return state.answers[p.id]===p.esVerdadero;
return false;
}).length;
bloqueHtml+=`<div class="sg-item"><div class="sg-label">${bloqueNames[b-1]}</div><div class="sg-val" style="color:${ok/qs.length>=0.6?"var(--green)":"var(--red)"}">${ok}/${qs.length} (${Math.round(ok/qs.length*100)}%)</div></div>`;
}
const box=document.getElementById("summaryBox");
box.innerHTML=`
<h2>Resultado Final</h2>
<div class="summary-nota" style="color:${aprobado?"var(--green)":"var(--red)"}">${nota}</div>
<div class="summary-msg">${msg}</div>
<div style="display:flex;gap:1rem;justify-content:center;margin:.5rem 0">
<div style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:var(--green)">${state.correct}</div><div style="font-size:.75rem;color:var(--text2)">Correctas</div></div>
<div style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:var(--red)">${state.wrong}</div><div style="font-size:.75rem;color:var(--text2)">Incorrectas</div></div>
<div style="text-align:center"><div style="font-size:1.5rem;font-weight:700;color:var(--accent)">${Math.round(pctOk*100)}%</div><div style="font-size:.75rem;color:var(--text2)">Aciertos</div></div>
</div>
<div class="summary-grid">${bloqueHtml}</div>
<div class="summary-btns">
<button class="sum-btn" onclick="showWrong()">Ver preguntas fallidas</button>
<button class="sum-btn primary" onclick="resetQuiz()">Reiniciar evaluación</button>
</div>`;
document.getElementById("summaryOverlay").classList.add("show");
}

function showWrong(){
document.getElementById("summaryOverlay").classList.remove("show");
document.querySelectorAll(".card").forEach(c=>{
const qId=parseInt(c.id.replace("q-",""));
const q=preguntas.find(p=>p.id===qId);
if(!q||q.tipo==="desarrollo"){c.classList.add("hidden");return;}
if(q.tipo==="alternativa"&&state.answers[qId]===q.correcta){c.classList.add("hidden");return;}
if(q.tipo==="vf"&&state.answers[qId]===q.esVerdadero){c.classList.add("hidden");return;}
c.classList.remove("hidden");
});
document.querySelectorAll(".section-title").forEach(t=>t.classList.add("hidden"));
window.scrollTo({top:0,behavior:"smooth"});
}

function resetQuiz(){
state.answers={};state.correct=0;state.wrong=0;
document.getElementById("summaryOverlay").classList.remove("show");
buildQuiz();
updatePanel();
document.getElementById("fpNota").textContent="—";
window.scrollTo({top:0,behavior:"smooth"});
}

function buildQuiz(){
const container=document.getElementById("quizContainer");
container.innerHTML="";
// Section A
const altQs=preguntas.filter(p=>p.tipo==="alternativa");
const titleA=document.createElement("h2");
titleA.className="section-title";titleA.id="secA";
titleA.innerHTML=`<span class="icon">📝</span> Sección A — Preguntas de Alternativas (${altQs.length})`;
container.appendChild(titleA);
let currentBloque=0;
altQs.forEach(q=>{
if(q.bloque!==currentBloque){
currentBloque=q.bloque;
const bTitle=document.createElement("h3");
bTitle.id="bloque-"+q.bloque;
bTitle.style.cssText="font-size:1.1rem;color:var(--accent);margin:1.5rem 0 .8rem;padding-left:.5rem;border-left:3px solid var(--accent)";
bTitle.textContent=`Bloque ${q.bloque}: ${bloqueNames[q.bloque-1]}`;
container.appendChild(bTitle);
}
container.appendChild(renderAlternativa(q));
});
// Section B
const vfQs=preguntas.filter(p=>p.tipo==="vf");
const titleB=document.createElement("h2");
titleB.className="section-title";titleB.id="secB";
titleB.innerHTML=`<span class="icon">✅</span> Sección B — Verdadero o Falso (${vfQs.length})`;
container.appendChild(titleB);
vfQs.forEach(q=>container.appendChild(renderVF(q)));
// Section C
const devQs=preguntas.filter(p=>p.tipo==="desarrollo");
const titleC=document.createElement("h2");
titleC.className="section-title";titleC.id="secC";
titleC.innerHTML=`<span class="icon">💡</span> Sección C — Preguntas de Desarrollo (${devQs.length})`;
container.appendChild(titleC);
devQs.forEach(q=>container.appendChild(renderDev(q)));
// spacer
const spacer=document.createElement("div");
spacer.style.height="80px";
container.appendChild(spacer);
}

// Init
buildQuiz();
renderNav();
updatePanel();
</script>
</body>
</html>
